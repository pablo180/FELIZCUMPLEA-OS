<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🎂 ¡Feliz Cumpleaños 15x2, Leslie! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 20%, #2e1a3a, #0a0510);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Montserrat', sans-serif;
            overflow: hidden;
            position: relative;
            touch-action: pan-y pinch-zoom;
        }

        /* Canvas de fuegos artificiales (interactivo) */
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: auto;
            z-index: 2;
        }

        /* Contenedor principal del SVG centrado */
        .cake-stage {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }

        svg {
            display: block;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
        }

        /* Título principal flotante */
        .birthday-title {
            position: fixed;
            top: 5%;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            animation: floatTitle 3s ease-in-out infinite;
        }

        .birthday-title h1 {
            font-size: clamp(2.2rem, 8vw, 4.8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #FFD966, #FF88B5, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.5), 0 0 30px rgba(255, 105, 180, 0.4);
            letter-spacing: 2px;
        }

        /* Cinta interactiva inferior */
        .wish-ribbon {
            position: fixed;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 220, 150, 0.2);
            backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 60px;
            color: #FFECB3;
            font-weight: bold;
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            border: 1px solid rgba(255, 220, 120, 0.6);
            box-shadow: 0 0 20px rgba(255, 180, 80, 0.3);
            z-index: 20;
            pointer-events: none;
            white-space: nowrap;
            animation: bounceRibbon 2s infinite;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .hint-click {
            position: fixed;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.3);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 0.75rem;
            color: #ffdd99;
            backdrop-filter: blur(4px);
            z-index: 20;
            pointer-events: none;
            white-space: nowrap;
            font-weight: 500;
        }

        @keyframes floatTitle {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes bounceRibbon {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }

        @media (max-width: 650px) {
            .wish-ribbon { white-space: normal; width: 85%; text-align: center; padding: 8px 16px; font-size: 0.8rem; bottom: 6%; }
            .hint-click { bottom: 12px; font-size: 0.65rem; }
            .birthday-title { top: 2%; }
        }

        @media (max-height: 700px) {
            .cake-stage { transform: scale(0.92); transition: transform 0.2s; }
        }
    </style>
</head>

    <script>
        (function() {
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, dpr;
            
            function resizeCanvas() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                width = canvas.width = window.innerWidth * dpr;
                height = canvas.height = window.innerHeight * dpr;
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const gravity = 0.03;
            const friction = 0.985;
            let rockets = [];
            let particles = [];
            
            function random(min, max) { return min + Math.random() * (max - min); }
            function hslColor(h, s, l, a) { return `hsla(${h}, ${s}%, ${l}%, ${a})`; }
            
            function launchFirework() {
                const x0 = random(width * 0.2, width * 0.8);
                const y0 = height;
                const targetX = random(width * 0.2, width * 0.8);
                const targetY = random(height * 0.15, height * 0.45);
                const angle = Math.atan2(targetY - y0, targetX - x0);
                const speed = random(9, 13);
                rockets.push({
                    x: x0, y: y0, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    colorHue: Math.floor(random(0, 360)), targetY: targetY
                });
            }
            
            function explodeParticles(x, y, baseHue) {
                const particleCount = 280;
                for (let i = 0; i < particleCount; i++) {
                    const angle = random(0, Math.PI * 2);
                    const speed = random(2, 8);
                    particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: random(1.0, 1.8),
                        hue: baseHue + random(-25, 25)
                    });
                }
            }
            
            function updateFireworks() {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'lighter';
                
                for (let i = rockets.length-1; i >= 0; i--) {
                    const r = rockets[i];
                    r.vy += gravity;
                    r.x += r.vx;
                    r.y += r.vy;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, 3.2 * dpr, 0, Math.PI*2);
                    ctx.fillStyle = hslColor(r.colorHue, 100, 60, 1);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(r.x, r.y);
                    ctx.lineTo(r.x - r.vx * 3, r.y - r.vy * 3);
                    ctx.strokeStyle = hslColor(r.colorHue, 100, 65, 0.7);
                    ctx.lineWidth = 2.2 * dpr;
                    ctx.stroke();
                    
                    if (r.y <= r.targetY || r.vy >= 0.5) {
                        explodeParticles(r.x, r.y, r.colorHue);
                        rockets.splice(i,1);
                    }
                }
                
                for (let i=particles.length-1; i>=0; i--) {
                    const p = particles[i];
                    p.vx *= friction;
                    p.vy = p.vy * friction + gravity * 0.45;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.012;
                    if (p.life <= 0) { particles.splice(i,1); continue; }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2.8 * dpr * (p.life / 1.5), 0, Math.PI*2);
                    ctx.fillStyle = hslColor(p.hue, 100, 65, Math.min(p.life, 1.0));
                    ctx.fill();
                }
                requestAnimationFrame(updateFireworks);
            }
            
            function startBursts() {
                launchFirework();
                setTimeout(() => launchFirework(), 200);
                setTimeout(() => launchFirework(), 450);
                setTimeout(() => launchFirework(), 700);
                setTimeout(() => launchFirework(), 950);
            }
            
            canvas.addEventListener('click', (e) => { startBursts(); });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startBursts(); });
            
            updateFireworks();
            setTimeout(startBursts, 500);
            
            // Animación de flamas
            const flames = document.querySelectorAll('.flame');
            if(flames.length) {
                setInterval(() => {
                    flames.forEach(flame => {
                        const scaleVal = 0.85 + Math.random() * 0.5;
                        flame.style.transform = `scale(${scaleVal}) translateY(${Math.random() * 4 - 2}px)`;
                        flame.style.transformOrigin = 'center bottom';
                    });
                }, 150);
            }
        })();
    </script>
</body>
</html>
